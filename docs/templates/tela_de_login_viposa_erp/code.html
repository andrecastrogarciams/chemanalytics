<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f45b3",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .industrial-overlay {
            background-blend-mode: overlay;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative min-h-screen flex flex-col items-center justify-center p-4 industrial-overlay bg-slate-200/50 dark:bg-slate-900/80" data-alt="Industrial manufacturing facility with modern machinery" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuABX6pwl66bSW5-5y4UpJmr-3ieeu7LUPYF_EdmdkBiDvkINNzOcwV1L9LxHvLpCnFzozvdBXIiNTXf6tm9WuI1-18iMoMY-Wz77G_Ri66VOXjXoovEFK2QNfeAJHglQzLrRXf6iheXmIfwJIy9O-EDecqQvBdsMc0oaBOEumBNqOQloPA5oyXvBSyVTmfQOUaJHl82IHf2hqkTByWBmOzPPbqkAo_C7P5eJ3BxgCQdYT6UrDX3x6wFJlgIu2m6jc7RV-kINrvuybzs');">
<!-- Main Content Container -->
<div class="z-10 w-full max-w-md">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm mb-4">
<img alt="Viposa Logo" class="h-12 w-auto" data-alt="Viposa Industrial ERP corporate logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAa3GzjSfm8vvWitGIFC3YwuD24rAFCW3aqpHilutl_nLN5jRPHWztHUKatoDCgefxGgzeLjkzJcOHzpkyqJUVS2rl0I0nrzJvyAWrZAsxrWAGDvb6uqA37LX--HHa7KFKkavlHIiMv_7o59y1MzSmGQ4pmKmh2h3-_U6M2XC8nc9jNsB2-iOUI-yr6GS1N70tHwiRIS6KOv4pNSkjX1pV_jaEyVAbg-xkmQj-j81WHd8c2XvfopFS6q7xwZkbDGj2I5EcxMz_HwTlW"/>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">ERP System Access</h1>
<p class="text-slate-600 dark:text-slate-400 mt-1">Industrial Intelligence Platform</p>
</div>
<!-- Login Card -->
<div class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-sm p-8 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700">
<form action="#" class="space-y-6" method="POST">
<!-- Email/Username Field -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2" for="username">Username or Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all sm:text-sm" id="username" name="username" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all sm:text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">
                                Remember me
                            </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">
                                Forgot password?
                            </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-[0.98]" type="submit">
                        Sign In to ERP
                    </button>
</form>
<!-- Help Link -->
<div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Need assistance? 
                        <a class="font-medium text-primary hover:text-primary/80" href="#">Contact Support</a>
</p>
</div>
</div>
</div>
<!-- Footer -->
<footer class="mt-auto w-full max-w-4xl px-4 py-8 text-center z-10">
<div class="flex flex-col md:flex-row items-center justify-center gap-4 text-xs font-medium uppercase tracking-wider text-slate-500 dark:text-slate-400">
<span>Viposa S.A. - Todos os direitos reservados</span>
<span class="hidden md:block">•</span>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Technical Support</a>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</div>
</div>
</footer>
</div>
</body></html>
